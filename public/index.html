<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #537d90;
      --accent-hover: #6a94a8;
      --err: #e57373;
      --ok: #81c784;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.25rem; }
    h2 { font-size: 1.05rem; font-weight: 600; margin: 2rem 0 0.75rem; color: var(--muted); }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input, textarea, select {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #2d3a4d;
      background: #121a26;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    textarea { min-height: 72px; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    button, .btn {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #2d3a4d; }
    button.secondary:hover { background: #3d4d64; }
    button.danger { background: #6b3a3a; }
    button.danger:hover { background: #804444; }
    .out {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      background: var(--card);
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 2.5rem;
      border: 1px solid #2d3a4d;
    }
    .out.err { color: var(--err); border-color: #5c3030; }
    .out.ok { color: var(--ok); border-color: #2d4a32; }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: -0.5rem; margin-bottom: 1rem; }
    .topic-pill {
      display: inline-block;
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      background: #121a26;
      border: 1px solid #2d3a4d;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      user-select: all;
    }
    .meta-row { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
    .sched-item {
      background: var(--card);
      border: 1px solid #2d3a4d;
      border-radius: 8px;
      padding: 0.85rem;
      margin-bottom: 0.65rem;
      font-size: 0.85rem;
    }
    .sched-item strong { color: var(--text); }
    .sched-actions { display: flex; gap: 0.5rem; margin-top: 0.65rem; }
    .sched-actions button { flex: 1; margin: 0; font-size: 0.8rem; padding: 0.45rem; }
    hr.sep { border: none; border-top: 1px solid #2d3a4d; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="siteTitle">Notifications</h1>
    <p class="sub" id="siteSub">Tuma arifa (FCM) na ratiba.</p>
    <div class="meta-row">Topic: <span class="topic-pill" id="topicDisplay">—</span></div>
    <div class="meta-row" id="tzRow" style="display:none;">Muda wa kila siku: <span id="tzDisplay"></span></div>

    <label for="adminKey">Nenosiri la admin (ratiba)</label>
    <input id="adminKey" type="password" placeholder="Weka ikiwa .env ina ADMIN_SECRET" autocomplete="off" />
    <p class="hint">Inahifadhiwa kwenye kivinjari (session) tu. Ikiwa ADMIN_SECRET haitumiki, acha tupu.</p>

    <hr class="sep" />

    <h2>Tuma sasa</h2>
    <form id="f">
      <label for="title">Kichwa (title)</label>
      <input id="title" name="title" type="text" placeholder="Hiari" autocomplete="off" />

      <label for="body">Maelezo (body)</label>
      <textarea id="body" name="body" placeholder="Hiari"></textarea>

      <label for="image">Kiungo cha picha</label>
      <input id="image" name="image" type="url" placeholder="https://..." autocomplete="off" />

      <button type="submit" id="btn">Tuma</button>
    </form>
    <div id="out" class="out" aria-live="polite"></div>

    <hr class="sep" />

    <h2>Ratiba</h2>
    <p class="hint" style="margin-top:0;">Mara moja au kila siku (saa kwa <span id="tzHint">TZ</span>).</p>

    <form id="schedForm">
      <label for="sTitle">Title</label>
      <input id="sTitle" type="text" placeholder="Hiari" />
      <label for="sBody">Body</label>
      <textarea id="sBody" placeholder="Hiari"></textarea>
      <label for="sImage">Picha URL</label>
      <input id="sImage" type="url" placeholder="https://..." />

      <label for="sMode">Aina</label>
      <select id="sMode">
        <option value="once">Mara moja (tarehe &amp; saa)</option>
        <option value="daily">Kila siku (saa ile ile)</option>
      </select>

      <div id="onceFields">
        <label for="sRunAt">Tarehe na saa</label>
        <input id="sRunAt" type="datetime-local" />
      </div>
      <div id="dailyFields" style="display:none;">
        <label for="sDailyTime">Saa (HH:mm)</label>
        <input id="sDailyTime" type="time" />
      </div>

      <button type="submit" id="schedBtn">Ongeza ratiba</button>
    </form>
    <div id="schedOut" class="out" style="min-height:1rem;"></div>
    <div id="schedList"></div>
  </div>

  <script>
    const ADMIN_KEY = 'webNotifyAdminSecret';
    const out = document.getElementById('out');
    const btn = document.getElementById('btn');
    const schedOut = document.getElementById('schedOut');
    const schedList = document.getElementById('schedList');
    const adminInput = document.getElementById('adminKey');

    adminInput.value = sessionStorage.getItem(ADMIN_KEY) || '';
    adminInput.addEventListener('change', () => {
      sessionStorage.setItem(ADMIN_KEY, adminInput.value.trim());
    });

    function adminHeaders() {
      const h = { 'Content-Type': 'application/json' };
      const s = (adminInput.value || sessionStorage.getItem(ADMIN_KEY) || '').trim();
      if (s) h['x-admin-secret'] = s;
      return h;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let meta = { siteName: 'Notifications', topic: '', scheduleTz: 'UTC', adminRequired: false };

    fetch('/api/meta')
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        if (!j) return;
        meta = j;
        document.getElementById('siteTitle').textContent = j.siteName || 'Notifications';
        document.title = (j.siteName || 'Notifications') + ' — FCM';
        document.getElementById('topicDisplay').textContent = j.topic || '—';
        if (j.scheduleTz) {
          document.getElementById('tzRow').style.display = 'block';
          document.getElementById('tzDisplay').textContent = j.scheduleTz;
          document.getElementById('tzHint').textContent = j.scheduleTz;
        }
      })
      .catch(() => {});

    document.getElementById('sMode').addEventListener('change', () => {
      const once = document.getElementById('sMode').value === 'once';
      document.getElementById('onceFields').style.display = once ? 'block' : 'none';
      document.getElementById('dailyFields').style.display = once ? 'none' : 'block';
    });

    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      out.textContent = '';
      out.className = 'out';
      btn.disabled = true;
      const title = document.getElementById('title').value.trim();
      const body = document.getElementById('body').value.trim();
      const image = document.getElementById('image').value.trim();
      try {
        const res = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, body, image }),
        });
        const text = await res.text();
        let msg = text;
        try {
          const j = JSON.parse(text);
          msg = j.error || j.message || JSON.stringify(j, null, 2);
        } catch (_) {}
        if (res.ok) {
          out.className = 'out ok';
          out.textContent = 'Imefanikiwa:\n' + msg;
        } else {
          out.className = 'out err';
          out.textContent = 'Hitilafu (' + res.status + '):\n' + msg;
        }
      } catch (err) {
        out.className = 'out err';
        out.textContent = 'Mtandao: ' + (err && err.message ? err.message : String(err));
      }
      btn.disabled = false;
    });

    async function loadSchedules() {
      schedList.innerHTML = '';
      schedOut.textContent = '';
      schedOut.className = 'out';
      try {
        const res = await fetch('/api/schedule', { headers: adminHeaders() });
        const j = await res.json().catch(() => ({}));
        if (!res.ok) {
          schedOut.className = 'out err';
          schedOut.textContent = j.error || res.statusText;
          return;
        }
        const items = j.items || [];
        if (items.length === 0) {
          schedList.innerHTML = '<p class="hint">Hakuna ratiba bado.</p>';
          return;
        }
        items
          .slice()
          .reverse()
          .forEach((it) => {
            const el = document.createElement('div');
            el.className = 'sched-item';
            el.dataset.id = it.id;
            el.dataset.enabled = it.enabled ? '1' : '0';
            const when =
              it.mode === 'once'
                ? 'Mara moja: ' + (it.runAt || '—')
                : 'Kila siku: ' +
                  String(it.hour ?? 0).padStart(2, '0') +
                  ':' +
                  String(it.minute ?? 0).padStart(2, '0');
            const preview = (it.body || '').slice(0, 120);
            el.innerHTML =
              '<strong>' +
              escapeHtml(it.title || '(bila kichwa)') +
              '</strong><br/>' +
              escapeHtml(preview) +
              (it.body && it.body.length > 120 ? '…' : '') +
              '<br/><span class="hint">' +
              escapeHtml(when) +
              ' · ' +
              (it.enabled ? 'washa' : 'zima') +
              (it.lastSentAt ? ' · mwisho: ' + escapeHtml(it.lastSentAt) : '') +
              '</span>' +
              '<div class="sched-actions">' +
              '<button type="button" class="secondary" data-act="toggle">' +
              (it.enabled ? 'Zima' : 'Washa') +
              '</button>' +
              '<button type="button" class="danger" data-act="delete">Futa</button></div>';
            schedList.appendChild(el);
          });
        schedList.querySelectorAll('button[data-act]').forEach((b) => {
          b.addEventListener('click', onSchedAction);
        });
      } catch (err) {
        schedOut.className = 'out err';
        schedOut.textContent = String(err.message || err);
      }
    }

    async function onSchedAction(ev) {
      const btn = ev.currentTarget;
      const row = btn.closest('.sched-item');
      if (!row) return;
      const id = row.dataset.id;
      const act = btn.getAttribute('data-act');
      let body;
      if (act === 'delete') {
        body = { action: 'delete', id };
      } else if (act === 'toggle') {
        const cur = row.dataset.enabled === '1';
        body = { action: 'setEnabled', id, enabled: !cur };
      } else return;
      try {
        const res = await fetch('/api/schedule', {
          method: 'POST',
          headers: adminHeaders(),
          body: JSON.stringify(body),
        });
        const j = await res.json().catch(() => ({}));
        if (!res.ok) {
          schedOut.className = 'out err';
          schedOut.textContent = j.error || res.statusText;
          return;
        }
        await loadSchedules();
      } catch (e) {
        schedOut.className = 'out err';
        schedOut.textContent = String(e.message || e);
      }
    }

    document.getElementById('schedForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      schedOut.textContent = '';
      schedOut.className = 'out';
      const mode = document.getElementById('sMode').value;
      const title = document.getElementById('sTitle').value.trim();
      const body = document.getElementById('sBody').value.trim();
      const image = document.getElementById('sImage').value.trim();
      const payload = { title, body, image, mode };
      if (mode === 'once') {
        const local = document.getElementById('sRunAt').value;
        if (!local) {
          schedOut.className = 'out err';
          schedOut.textContent = 'Chagua tarehe na saa.';
          return;
        }
        payload.runAt = new Date(local).toISOString();
      } else {
        const t = document.getElementById('sDailyTime').value;
        if (!t) {
          schedOut.className = 'out err';
          schedOut.textContent = 'Chagua saa.';
          return;
        }
        payload.dailyTime = t.length === 5 ? t : t.slice(0, 5);
      }
      try {
        const res = await fetch('/api/schedule', {
          method: 'POST',
          headers: adminHeaders(),
          body: JSON.stringify(payload),
        });
        const j = await res.json().catch(() => ({}));
        if (!res.ok) {
          schedOut.className = 'out err';
          schedOut.textContent = j.error || res.statusText;
          return;
        }
        schedOut.className = 'out ok';
        schedOut.textContent = 'Imehifadhiwa.';
        document.getElementById('schedForm').reset();
        document.getElementById('sMode').value = mode;
        document.getElementById('sMode').dispatchEvent(new Event('change'));
        await loadSchedules();
      } catch (err) {
        schedOut.className = 'out err';
        schedOut.textContent = String(err.message || err);
      }
    });

    loadSchedules();
  </script>
</body>
</html>
